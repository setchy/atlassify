name: Lint

on:
  workflow_call:
    inputs:
      directory:
        type: string
        required: true
        description: "The directory to lint"

permissions:
  contents: read

jobs:
  lint:
    name: biomejs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-node
        with:
          directory: ${{ github.event.inputs.directory }}

      - name: Run linter
        run: pnpm lint:check
        working-directory: ${{ github.event.inputs.directory }}
