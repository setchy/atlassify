name: Lint

on:
  workflow_call:
    inputs:
      directory:
        type: string
        required: true
        description: "The directory to lint"

permissions:
  contents: read

jobs:
  lint-code:
    name: biomejs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          directory: ${{ inputs.directory }}

      - name: Run linter
        run: pnpm lint:check
        working-directory: ${{ inputs.directory }}

  lint-i18n:
    name: i18n linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          directory: ${{ inputs.directory }}

      - name: i18n linter
        run: pnpm i18n:lint
        working-directory: ${{ inputs.directory }}

      - name: i18n check
        run: pnpm i18n:check
        working-directory: ${{ inputs.directory }}

  lint-actions:
    name: actionslint
    runs-on: ubuntu-latest

    steps:
      - name: GitHub Actions linter
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
