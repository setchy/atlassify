# This is the composite action:
#   https://docs.github.com/en/actions/creating-actions/creating-a-composite-action

name: Setup pnpm, node.js and install dependencies
description: Setup pnpm and node.js with caching

inputs:
  run-install:
    description: 'Whether to run `pnpm install`'
    required: false
    default: 'true'
  directory:
    description: 'Working directory to run `pnpm install` in'
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
      with:
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .nvmrc
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      if: ${{ inputs.run-install == 'true' }}
      run: pnpm install --frozen-lockfile
      working-directory: ${{ inputs.directory }}
      shell: bash
