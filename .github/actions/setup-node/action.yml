# This is the composite action:
#   https://docs.github.com/en/actions/creating-actions/creating-a-composite-action

name: Checkout and setup pnpm + node.js
description: Checkout project, setup pnpm and node.js with caching

inputs:
  fetch-depth:
    description: 'Depth for git clone (default: 1 - shallow clone)'
    required: false
    default: '1'
  run-install:
    description: 'Whether to run `pnpm install`'
    required: false
    default: 'true'
  directory:
    description: 'Working directory to run `pnpm install` in'
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      with:
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: .nvmrc
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      if: ${{ inputs.run-install == 'true' }}
      run: pnpm install --frozen-lockfile
      working-directory: ${{ inputs.directory }}
      shell: bash
