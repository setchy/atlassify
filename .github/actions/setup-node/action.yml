# This is the composite action:
#   https://docs.github.com/en/actions/creating-actions/creating-a-composite-action

name: Setup pnpm, node.js and install dependencies
description: Setup pnpm and node.js with caching

inputs:
  run-install:
    description: 'Whether to run `pnpm install`'
    required: false
    default: 'true'
  directory:
    description: 'Working directory to run `pnpm install` in'
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      with:
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: .nvmrc
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      if: ${{ inputs.run-install == 'true' }}
      run: pnpm install --frozen-lockfile
      working-directory: ${{ inputs.directory }}
      shell: bash
